<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD ann.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            min-height: 100vh;
            background: #000;
        }
        .fullscreen-image {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .fullscreen-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .error-message {
            color: white;
            text-align: center;
            font-family: monospace;
            font-size: 20px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="fullscreen-image" id="imageContainer">
        <div class="error-message">Searching for image.png...</div>
    </div>

    <script>
        const possiblePaths = [
            'image.png',
            './image.png',
            'images/image.png',
            'img/image.png',
            'assets/image.png',
            '../image.png',
            '../../image.png'
        ];

        async function findAndDisplayImage() {
            const container = document.getElementById('imageContainer');
            
            for (const path of possiblePaths) {
                try {
                    const response = await fetch(path, { method: 'HEAD' });
                    if (response.ok) {
                        container.innerHTML = `<img src="${path}" alt="Image">`;
                        return;
                    }
                } catch(e) {}
            }
            
            container.innerHTML = '<div class="error-message">image.png not found</div>';
        }

        findAndDisplayImage();
    </script>
</body>
</html>
